name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gantry:
    name: Gantry Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -q

      - name: Test
        run: mvn test

  legacy-svg2watercolor:
    name: Legacy SVG2WaterColor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -f legacy/SVG2WaterColor/pom.xml clean package -DskipTests -q

      - name: Test
        run: mvn -f legacy/SVG2WaterColor/pom.xml test

  legacy-svgtoolbox:
    name: Legacy SVGToolBox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn -f legacy/SVGToolBox/pom.xml clean package -q

      - name: Test
        run: mvn -f legacy/SVGToolBox/pom.xml test
