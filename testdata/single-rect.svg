<?xml version="1.0" encoding="UTF-8"?>
<!-- TS-G1: a lone rectangle. With only one drawable, the page-border heuristic
     must NOT fire: this rect IS the content and must be drawn, not dropped. -->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="20" y="20" width="60" height="60" fill="none" stroke="#000000"/>
</svg>
