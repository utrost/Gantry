<?xml version="1.0" encoding="UTF-8"?>
<!-- A handful of paths/lines, one colour, no layers. Used by most import/plot
     scripts (TS-G2, TS-F2, TS-O1, TS-S1, ...). -->
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="100" viewBox="0 0 120 100">
  <line x1="10" y1="10" x2="110" y2="10" stroke="#000000"/>
  <line x1="110" y1="10" x2="110" y2="90" stroke="#000000"/>
  <line x1="110" y1="90" x2="10" y2="90" stroke="#000000"/>
  <line x1="10" y1="90" x2="10" y2="10" stroke="#000000"/>
  <path d="M20,30 L60,70 L100,30" fill="none" stroke="#000000"/>
  <circle cx="60" cy="55" r="15" fill="none" stroke="#000000"/>
</svg>
