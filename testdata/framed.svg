<?xml version="1.0" encoding="UTF-8"?>
<!-- TS-G1: real content PLUS a full-page background/border rect (an Inkscape page
     outline). The outer rect spans the whole content extent, so the importer's
     page-border heuristic drops it (the pen must not trace the outer frame) while
     the inner shapes are kept and drawn. -->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- full-page border rect: spans the union of all geometry -> dropped on import -->
  <rect x="5" y="5" width="190" height="140" fill="none" stroke="#000000"/>
  <!-- inner content (strictly inside the border) -->
  <path d="M40,40 L160,40 L100,110 Z" fill="none" stroke="#000000"/>
  <circle cx="100" cy="70" r="22" fill="none" stroke="#000000"/>
</svg>
